<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Service disabled</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Arial, sans-serif;
        background: #f8faf9;
        color: #10251f;
      }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 620px);
        border: 1px solid #d7e3dd;
        border-radius: 8px;
        padding: 28px;
        background: #ffffff;
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 10px;
        color: #004331;
        font-size: clamp(1.8rem, 5vw, 2.45rem);
        line-height: 1.1;
      }
      p {
        color: #42534d;
        font-size: 1rem;
        line-height: 1.55;
      }
      .notice {
        margin-top: 18px;
        padding: 12px 14px;
        border: 1px solid #b00020;
        border-radius: 8px;
        background: #fff5f5;
        color: #5f1720;
        font-weight: 800;
      }
      .banner {
        margin: 0 0 20px;
        border-radius: 8px;
        padding: 14px 16px;
        background: #b00020;
        color: #ffffff;
        font-weight: 900;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="banner" role="status">Portal disabled for lack of payment</div>
      <h1>Service disabled</h1>
      <p>This client portal is no longer active. Access for this company has been fully disabled.</p>
      <div class="notice" role="status">No application is available from this address.</div>
    </main>
  </body>
</html>
